# Rime schema
# vim: set sw=2 sts=2 et:
# encoding: utf-8

schema:
  schema_id: blg_tsiang
  name: 閩南語漳州音
  version: "0.5"
  author:
    - 阿托 <a-thok@outlook.com>
  description: |
    閩南語輸入方案
    不採用「臺灣閩南語羅馬字拼音方案」
    http://www.ntcu.edu.tw/tailo/

switches:
  - name: ascii_mode
    reset: 0
    states: [ 中文, 西文 ]
  - name: full_shape
    states: [ 半角, 全角 ]
  - name: simplification
    states: [ 漢字, 汉字 ]

engine:
  processors:
    - ascii_composer
    - recognizer
    - key_binder
    - speller
    - punctuator
    - selector
    - navigator
    - express_editor
  segmentors:
    - ascii_segmentor
    - matcher
    - abc_segmentor
    - punct_segmentor
    - fallback_segmentor
  translators:
    - echo_translator
    - punct_translator
    - r10n_translator
    - reverse_lookup_translator
  filters:
    - simplifier
    - uniquifier

speller:
  alphabet: 'zyxwvutsrqponmlkjihgfedcba~[/\]90-;'
  initials: zyxwvutsrqponmlkjihgfedcba
  delimiter: " '"
  algebra:
    - abbrev/^([ptkbgmlschj]h?).+$/$1/ 
    - derive/uih/ueh/
    - derive/6/7/
    - derive/Ia/ia/
    - derive/IR/ir/
    - derive/ir/i/
    - derive/ur/u/
    - derive/er([^eptkmng]*)(h?)$/ue$1$2/
    - derive/Er/e/
    - derive/ere/e/
    - derive/uAinn/uan/
    - derive/uainn/uenn/	#南靖
    - derive/iO/oo/
    - derive/U/i/
    - derive/aInn/an/
    - derive/aInn/ing/
    - derive/^ngaI/gan/
    - derive/^ngaI/ging/
    - derive/^mue/bue/
    - derive/iunn/ionn/	
    - derive/niu/nio/
    - derive/uee/ua/
    - derive/ern/in/
    - derive/ere/e/
    - derive/uI/ui/
    - derive/khIRR/khir/
    - derive/i(ng|k)/e$1/		#漳南
    - derive/i(ng|k)/io$1/		#漳南
    - derive/oo/ou/		#漳南
    - derive/^([^eur]*)e(\d?)$/$1ei$2/		#漳南
    - derive/^([^eur]*)e(\d?)$/$1iei$2/		#漳浦
    - derive/^([a-z]+)\d$/$1/
    - 'xlit 12345678 [/\]90-;'
    - xform/^([ptk])/\U$1\E/
    - xform/^([PTK])h/\L$1\E/ #闽南语拼音化
    - xform/^([bdg])/$1$1/
    - xlit/PTK/bdg/
    - xform/^c/z/
    - xform/^zh/c/
    - xform/^j/zz/
    - xform/^i([aeou])/y$1/ 
    - xform/^u([aeoi])/w$1/
    - xform/^i/yi/ 
    - xform/^u/wu/ 
    - xform/au/ao/


translator:
  dictionary: banlam
  preedit_format:
    - 'xform ([aeiou])(r?m?n*h?g?p?t?k?)([\[/\\\]90\-;]) $1$3$2'
    - 'xform ([aeo])([iueo])([\[/\\\]90\-;]) $1$3$2'
    - 'xform a\[ ā'
    - 'xform e\[ ē'
    - 'xform i\[ ī'
    - 'xform u\[ ū'
    - 'xform o\[ ō'
    - 'xform m\[ m̄'
    - 'xform ng\[ ̄ng'
    - 'xform a/ ǎ'
    - 'xform e/ ě'
    - 'xform i/ ǐ'
    - 'xform u/ ǔ'
    - 'xform o/ ǒ'
    - 'xform m/ m̌'
    - 'xform ng/ ňg'
    - 'xform a\\ à'
    - 'xform e\\ è'
    - 'xform i\\ ì'
    - 'xform u\\ ù'
    - 'xform o\\ ò'
    - 'xform ng\\ ǹg'
    - 'xform a\] a'
    - 'xform e\] e'
    - 'xform i\] i'
    - 'xform u\] u'
    - 'xform o\] o'
    - 'xform mh\] mh'
    - 'xform ngh\] ngh'
    - 'xform a9 á'
    - 'xform e9 é'
    - 'xform i9 í'
    - 'xform u9 ú'
    - 'xform o9 ó'
    - 'xform m9 ḿ'
    - 'xform ng9 ńg'
    - 'xform a0 a'
    - 'xform e0 e'
    - 'xform i0 i'
    - 'xform u0 u'
    - 'xform o0 o'
    - 'xform ng0 ng'
    - 'xform a- â'
    - 'xform e- ê'
    - 'xform i- î'
    - 'xform u- û'
    - 'xform o- ô'
    - 'xform m- m̂'
    - 'xform ng- n̂g'
    - 'xform a; a̍'
    - 'xform e; e̍'
    - 'xform i; i̍'
    - 'xform u; u̍'
    - 'xform o; o̍'
    - 'xform mh; m̍h'
    - 'xform ngh; n̍gh'
    - 'xform q h'


reverse_lookup:
  dictionary: luna_pinyin
  prefix: "`"
  tips: 〔拼音〕
  preedit_format:
    - xform/([nljqxy])v/$1ü/

punctuator:
  import_preset: default

key_binder:
  import_preset: default
  bindings:
    - { when: has_menu, accept: minus, send: minus }  # 第7調
    - { when: paging, accept: minus, send: Page_Up }

recognizer:
  import_preset: default
  patterns:
    reverse_lookup: "`[a-z]*$"
